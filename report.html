<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Entanda Secondary School - Grade 10 Report</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body { font-family: Arial; margin: 20px; background: #f4f8ff; }
.header { text-align: center; color: #0a3d91; }
.section-title { margin-top: 30px; font-weight: bold; font-size: 18px; color: #0a3d91; }
input, select { border: none; border-bottom: 1px solid #000; padding: 3px; }
table { width: 100%; border-collapse: collapse; margin-top: 10px; background: white; }
th { background: #0a3d91; color: white; padding: 8px; }
td { border: 1px solid #ccc; padding: 6px; text-align: center; }
.marks { width: 60px; }
button { background: #0a3d91; color: white; border: none; padding: 6px 12px; cursor: pointer; margin: 3px 0; }
button:hover { background: #062866; }
.footer { margin-top: 40px; display: flex; justify-content: space-between; }
.signature { width: 200px; border-top: 1px solid black; text-align: center; padding-top: 5px; margin-top: 40px; }
.total-level { margin-top: 10px; font-weight: bold; }
</style>
</head>
<body>

<div class="header">
<h2>Entanda Secondary School</h2>
Term: <input id="term">
Year: <input id="year">
</div>

<br>

Student Name: <input id="name">
Admission No: <input id="adm">
Class: 
<select id="class"><option value="Grade10">Grade 10</option></select>

<br><br>

<div class="section-title">Grade 10 Subjects</div>
<table>
<tbody id="grade10">
<tr><td>English</td><td><input class="marks" oninput="calculate()"></td></tr>
<tr><td>Kiswahili</td><td><input class="marks" oninput="calculate()"></td></tr>
<tr><td>Mathematics</td><td><input class="marks" oninput="calculate()"></td></tr>
<tr><td>Biology</td><td><input class="marks" oninput="calculate()"></td></tr>
<tr><td>Chemistry</td><td><input class="marks" oninput="calculate()"></td></tr>
<tr><td>Physics</td><td><input class="marks" oninput="calculate()"></td></tr>
<tr><td>Geography</td><td><input class="marks" oninput="calculate()"></td></tr>
<tr><td>History</td><td><input class="marks" oninput="calculate()"></td></tr>
<tr><td>CRE</td><td><input class="marks" oninput="calculate()"></td></tr>
<tr><td>Computer Studies</td><td><input class="marks" oninput="calculate()"></td></tr>
<tr><td>Elective</td><td><input class="marks" oninput="calculate()"></td></tr>
</tbody>
</table>

<div class="total-level">Total Marks: <span id="total">0</span> | Level: <span id="meangrade">-</span></div>

<div class="footer">
<div class="signature">Class Teacher Signature</div>
<div class="signature">Principal Signature</div>
</div>

<br>
<button onclick="saveStudent()">SAVE STUDENT</button>
<button onclick="updateStudent()">UPDATE STUDENT</button>
<button onclick="loadAllDatabases()">LOAD CLASS DATABASE</button>

<div class="section-title">Class Database</div>
<div id="classDBs"></div>
<button onclick="downloadFullClassPDF('Grade10_students')">Download Full Class PDF</button>
<button onclick="clearClass('Grade10_students')">Clear Grade 10 Database</button>

<script>
let editIndex=null; let editKey=null;

function gradeSystemSubject(m){ if(m>=81) return "E.E"; if(m>=61) return "M.E"; if(m>=51) return "A.E"; return "B.E"; }
function gradeSystemTotal(total,outof){ if(total>=900) return "E.E"; if(total>=700) return "M.E"; if(total>=550) return "A.E"; return "B.E"; }
function getTeacherComment(level){ if(level==="E.E") return "Excellent performance. Outstanding understanding in all subjects."; if(level==="M.E") return "Very good performance. Minor improvements needed."; if(level==="A.E") return "Average performance. Needs more effort and consistency."; return "Below expectation. Must work harder and seek guidance."; }
function calculate(){ let total=0; document.querySelectorAll(".marks").forEach(i=>total+=parseInt(i.value)||0); document.getElementById("total").innerText=total; document.getElementById("meangrade").innerText=gradeSystemTotal(total,11*100); }

function saveStudent(){
const cls=document.getElementById("class").value;
const key=cls+"_students";
let student={name:document.getElementById("name").value,adm:document.getElementById("adm").value,class:cls,term:document.getElementById("term").value,year:document.getElementById("year").value,subjects:{},total:0,level:"",outof:11*100};
document.querySelectorAll("#grade10 .marks").forEach(input=>{ let sub=input.parentElement.parentElement.children[0].innerText; let m=parseInt(input.value)||0; student.subjects[sub]={marks:m,level:gradeSystemSubject(m)}; student.total+=m; });
student.level=gradeSystemTotal(student.total,student.outof);
let db=JSON.parse(localStorage.getItem(key))||[]; db.push(student); db.sort((a,b)=>b.total-b.total); db.forEach((s,i)=>s.position=i+1); localStorage.setItem(key,JSON.stringify(db)); alert("Saved"); loadAllDatabases();
}

function enableEditFromDB(key,index){ const db=JSON.parse(localStorage.getItem(key))||[]; const s=db[index]; document.getElementById("name").value=s.name; document.getElementById("adm").value=s.adm; document.getElementById("class").value=s.class; document.getElementById("term").value=s.term; document.getElementById("year").value=s.year; let i=0; for(let sub in s.subjects) document.querySelectorAll("#grade10 .marks")[i++].value=s.subjects[sub].marks; calculate(); editIndex=index; editKey=key; }
function updateStudent(){ if(editIndex===null) return; let db=JSON.parse(localStorage.getItem(editKey))||[]; let student=db[editIndex]; student.name=document.getElementById("name").value; student.adm=document.getElementById("adm").value; student.term=document.getElementById("term").value; student.year=document.getElementById("year").value; let i=0; for(let sub in student.subjects){ let m=parseInt(document.querySelectorAll(".marks")[i++].value)||0; student.subjects[sub].marks=m; student.subjects[sub].level=gradeSystemSubject(m); } student.total=Object.values(student.subjects).reduce((a,s)=>a+s.marks,0); student.level=gradeSystemTotal(student.total,student.outof); db.sort((a,b)=>b.total-a.total); db.forEach((s,i)=>s.position=i+1); localStorage.setItem(editKey,JSON.stringify(db)); editIndex=null; editKey=null; alert("Updated"); loadAllDatabases(); }
function clearClass(key){ if(confirm("Clear all data?")){ localStorage.removeItem(key); loadAllDatabases(); } }

function loadAllDatabases(){
const key="Grade10_students"; const db=JSON.parse(localStorage.getItem(key))||[]; const div=document.getElementById("classDBs"); div.innerHTML=""; if(!db.length){ div.innerHTML="<h3>No students</h3>"; return; }
const subs=Object.keys(db[0].subjects); let html="<table><tr><th>Name</th>"; subs.forEach(s=>html+=`<th>${s}</th>`); html+="<th>Total</th><th>Level</th><th>Pos</th><th>PDF</th><th>Edit</th></tr>";
db.forEach((s,i)=>{ html+=`<tr><td>${s.name}</td>`; subs.forEach(sub=> html+=`<td>${s.subjects[sub].marks}</td>`); html+=`<td>${s.total}</td><td>${s.level}</td><td>${s.position}</td>`; html+=`<td><button onclick="downloadPDF('Grade10_students',${i})">PDF</button></td>`; html+=`<td><button onclick="enableEditFromDB('Grade10_students',${i})">EDIT</button></td>`; html+="</tr>"; });
html+="</table>"; div.innerHTML=html;
}

function downloadFullClassPDF(key){
  const db = JSON.parse(localStorage.getItem(key)) || [];
  if(!db.length) return;

  db.sort((a,b)=>b.total-a.total); 
  db.forEach((s,i)=>s.position=i+1);

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({orientation:'landscape', unit:'mm', format:'a4'});

  let y = 15;
  doc.setFontSize(18); 
  doc.setTextColor(0,102,204);
  doc.text("Entanda Secondary School",148,y,null,null,"center");
  y += 7;
  doc.setFontSize(12); doc.setTextColor(0,0,0);
  doc.text("Grade 10 CLASS PERFORMANCE REPORT",148,y,null,null,"center");
  y += 10;

  const subs = Object.keys(db[0].subjects);

  // HEADER
  doc.setFillColor(0,102,204); doc.setTextColor(255,255,255);
  doc.rect(10,y,277,8,'F');
  doc.text("Student Name",12,y+5);
  let x = 60;
  subs.forEach(sub => { doc.text(sub.substring(0,6), x, y+5); x += 15; });
  doc.text("Total", x, y+5); 
  doc.text("Level", x+15, y+5); 
  doc.text("Pos", x+30, y+5);
  y += 10;
  doc.setTextColor(0,0,0);

  // CALCULATE HIGHEST AND LOWEST PER SUBJECT
  let highs = {};
  let lows = {};
  subs.forEach(sub=>{
    const marks = db.map(s=>s.subjects[sub].marks);
    highs[sub] = Math.max(...marks);
    lows[sub] = Math.min(...marks);
  });

  // STUDENT ROWS WITH HIGHLIGHT
  db.forEach((s,i)=>{
    if(y>140){
      doc.addPage(); 
      y=15;
      doc.setFillColor(0,102,204); doc.setTextColor(255,255,255);
      doc.rect(10,y,277,8,'F');
      doc.text("Student Name",12,y+5);
      let xx = 60; subs.forEach(sub => { doc.text(sub.substring(0,6), xx, y+5); xx += 15; });
      doc.text("Total", xx, y+5);
      doc.text("Level", xx+15, y+5);
      doc.text("Pos", xx+30, y+5);
      y += 10;
      doc.setTextColor(0,0,0);
    }
    doc.rect(10,y,277,8);
    doc.text((i+1)+". "+s.name.substring(0,15),12,y+5);
    let xx = 60;
    subs.forEach(sub=>{
      const mark = s.subjects[sub].marks;
      if(mark===highs[sub]) doc.setTextColor(255,0,0);
      else if(mark===lows[sub]) doc.setTextColor(0,150,0);
      else doc.setTextColor(0,0,0);
      doc.text(String(mark), xx, y+5);
      xx += 15;
    });
    doc.setTextColor(0,0,0);
    doc.text(String(s.total), xx, y+5);
    doc.text(String(s.level), xx+15, y+5);
    doc.text(String(s.position), xx+30, y+5);
    y += 8;
  });

  // CALCULATE SUBJECT MEANS (EXACT FOR LINE GRAPH)
  let means = {};
  subs.forEach(sub=>{
    const marks = db.map(s => s.subjects[sub].marks);
    means[sub] = +(marks.reduce((a,b)=>a+b,0)/marks.length).toFixed(2); // exact mean
  });

  const totalMSS = +(db.reduce((sum,s)=>sum+s.total,0)/db.length).toFixed(2);

  // DISPLAY SUBJECT MSS BELOW TABLE
  y += 5;
  doc.setFontSize(11); doc.setTextColor(0,0,150);
  doc.text("Subject Mean Scores (MSS):",10,y);
  y += 5;
  let xx = 60;
  subs.forEach(sub=>{
    doc.text(String(means[sub]), xx, y);
    xx += 15;
  });

  // DISPLAY CLASS TOTAL MEAN
  y += 7;
  doc.setFontSize(12); doc.setTextColor(0,0,0);
  doc.text("Class Total Mean:", 12, y);
  doc.text(String(totalMSS), 60, y);

  // CHART OF SUBJECT MEANS
  const canvas = document.createElement('canvas');
  canvas.width = 1000; canvas.height = 400;
  const ctx = canvas.getContext('2d');
  new Chart(ctx,{
    type:'line',
    data:{
      labels:subs,
      datasets:[{
        label:'Subject Means (MSS)',
        data:subs.map(sub => means[sub]),
        fill:false,
        borderColor:'blue',
        tension:0.3
      }]
    },
    options:{responsive:false, scales:{y:{beginAtZero:true,max:100}}}
  });

  setTimeout(()=>{
    const chartImg = canvas.toDataURL('image/png');
    doc.addImage(chartImg,'PNG',20,y+10,260,80);
    doc.save("Grade10_FullClassReport.pdf");
  },500);
}
window.onload=loadAllDatabases;
</script>
</body>
</html>
